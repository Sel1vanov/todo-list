<!DOCTYPE html>
<html lang="ru">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

        <title>todo-list</title>
        <link rel="stylesheet" href="style.css">
        <script type="importmap">
            {
              "imports": {
                "@material/web/": "https://esm.run/@material/web/"
              }
            }
        </script>
        <script type="module">
            import '@material/web/all.js';
        </script>
        <script src="main.js" defer></script>
    </head>
    <body>
        <main>
            <div class="form-todo">
                <md-filled-text-field label="Название задачи" id="name-task"></md-filled-text-field>
                <md-filled-text-field
                class="wide-input"
                type="textarea"
                label="Описание задачи"
                rows="20"
                id = "main-input">
                </md-filled-text-field>
                <div class="buttons">
                    <md-outlined-button class="rst-btn">Очистить форму</md-outlined-button>
                    <md-filled-button class="add-task">Добавить задачу</md-filled-button>
                </div>
            </div>
            <div class="task-list">
            </div>

        </main>
    </body>
</html>
